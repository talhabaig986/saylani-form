<!DOCTYPE html>
<html>
<head>
    <title>Saylani Form</title>
<link rel="shortcut icon" href="./images/reg.png" type="image/x-icon">
    <style>
        body{
            background-color: white;
        }
        .main{
            width: 550px;
            margin: auto;
            text-align: center;
        }

        .logo{
            width: 320px;
            margin-top: 10px;
        }

        h1{
            font-size: 25px;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .form-box{
            background-color: #cfcfcf;
            padding: 15px 20px 20px 20px;
            text-align: left;
        }

        .form-box h2{
            text-align: center;
            font-size: 20px;
            margin-top: 5px;
            margin-bottom: 18px;
        }

        label{
            display: inline-block;
            width: 130px;
            font-size: 18px;
            margin-bottom: 18px;
        }

        input, select, textarea{
            font-size: 15px;
        }

        .input-box{
            width: 250px;
            height: 15px;
        }

        textarea{
            width: 255px;
            height: 70px;
        }

        .small-label{
          width: auto;
          font-size: 15px;
          margin-right: 8px;
        }

        .hobby-box{
            width: 120px;
            height: 70px;
        }

        .submit{
            text-align: center;
            margin-top: 5px;
        }
        .c{
          position:relative;
          bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="main">

        <img src="./images/logo.png" class="logo" alt="Saylani Logo">

        <h1>Saylani Online Academy</h1>

        <div class="form-box">
            <h2>Student Registration Form</h2>

            <form action="thankyou.html" method="get">

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" class="input-box" placeholder="Name" required>
                <br>

                <label for="fathername">Father Name:</label>
                <input type="text" id="fathername" name="fathername" class="input-box" placeholder="Father Name" required>
                <br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="input-box" placeholder="********" required>
                <br>

                <label for="address" class="c">Address:</label>
                <textarea id="address" name="address" placeholder="Address" required></textarea>
                <br>

                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male" class="small-label">Male</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female" class="small-label">Female</label>
                <br>

                <label>Language:</label>
                <input type="checkbox" id="urdu" name="language" value="urdu">
                <label for="urdu" class="small-label">Urdu</label>

                <input type="checkbox" id="english" name="language" value="english">
                <label for="english" class="small-label">English</label>

                <input type="checkbox" id="arabic" name="language" value="arabic">
                <label for="arabic" class="small-label">Arabic</label>

                <input type="checkbox" id="chinese" name="language" value="chinese">
                <label for="chinese" class="small-label">Chinese</label>
                <br>

                <label for="dob">DOB:</label>
                <input type="date" id="dob" name="dob" required>
                <br>

                <label for="email">Email Id:</label>
                <input type="email" id="email" name="email" class="input-box" placeholder="Email ID" required>
                <br>

                <label for="mobile">Mobile Number:</label>
                <input type="number" id="mobile" name="mobile" placeholder="Mobile Number" required>
                <br>

                <label for="city">City:</label>
                <select id="city" name="city" required>
                    <option value="">Select Your City</option>
                    <option value="karachi">Karachi</option>
                    <option value="lahore">Lahore</option>
                    <option value="hyderabad">Hyderabad</option>
                    <option value="islamabad">Islamabad</option>
                </select>
                <br>

                <label for="hobbies" class="c">Hobbies:</label>
                <select id="hobbies" name="hobbies" size="4" class="hobby-box" required>
                    <option value="cricket">Cricket</option>
                    <option value="football">Football</option>
                    <option value="hokey">Hockey</option>
                    <option value="tennis">Tennis</option>
                </select>
                <br><br>

                <label for="picture">Picture Upload:</label>
                <input type="file" id="picture" name="picture" required>
                <input type="button" value="Upload">
                <br>

                <div class="submit">
                    <input type="submit" value="Submit Form">
                </div>

            </form>
        </div>

    </div>

</body>
</html>
